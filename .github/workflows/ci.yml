name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Action pinning (M H4): every third-party `uses:` is pinned to a full commit
# SHA with an informational version comment. GitHub Actions MUST remain pinned to
# full commit SHAs; the version comment MUST be updated together with the SHA.
# Updates MUST be made through a dependency-update PR or by resolving the
# official upstream tag to its commit, with the resulting diff reviewed before
# merge -- major aliases (e.g. @v5) MUST NOT be restored in executable `uses:`
# fields.

# M G4 Step 4f.1 (D104.M.6): node-pty is the sole build-script-approved
# dependency (pnpm-workspace.yaml onlyBuiltDependencies). Its native binding is
# provisioned during `pnpm install` -- a source build via node-gyp on Linux
# (node-pty@1.1.0 ships no Linux prebuild) and a bundled prebuild on Windows.
# Node is pinned to an EXACT version so the Linux source build uses a fixed
# runtime/header target; any Node bump must re-run the toolchain, binding,
# PTY-probe, and live-smoke gates.
jobs:
  build-and-test:
    name: Build and test (Linux, Node 22.23.1)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Enable Corepack (uses runner's system Node; provides pnpm)
        run: corepack enable

      - name: Set up Node 22.23.1 with pnpm cache
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1
          cache: pnpm

      - name: Report native build toolchain (Linux source build)
        run: |
          node --version
          pnpm --version
          python3 --version
          make --version | head -n 1
          c++ --version | head -n 1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check dependency boundary (M H5)
        # Governance gate: the committed workspace manifests must satisfy
        # dependency-boundary.json. Invoked via the canonical package script so CI
        # and local contributors share one command and implementation changes stay
        # invisible here. No --as-of: the check evaluates against the current date
        # on purpose, so an expiring requiresReview override fails after its review
        # date; pinning a fixed date would defeat that mechanism.
        run: pnpm check:dependency-policy

      - name: Check license audit freshness (M H5)
        # Governance gate: LICENSE-AUDIT.md must be byte-identical to a fresh render
        # from the committed inputs (pnpm-lock.yaml + workspace manifests +
        # license-policy.json + license-metadata.json). Offline and deterministic; the
        # network refresh (refresh:license-metadata) is a separate manual step and is
        # NOT run in CI. Invoked via the canonical package script so CI and local
        # contributors share one command.
        run: pnpm check:license-audit

      - name: Verify node-pty binding
        working-directory: packages/cli-commands
        shell: bash
        run: |
          node -e '
            const pkg = require("node-pty/package.json");
            if (pkg.version !== "1.1.0") {
              throw new Error("unexpected node-pty version: " + pkg.version);
            }
            const mod = require("node-pty");
            if (typeof mod.spawn !== "function") {
              throw new Error("node-pty loaded without a callable spawn export");
            }
            console.log(
              "[node-pty binding] PASS: version=" + pkg.version +
              " spawn=function node=" + process.versions.node +
              " platform=" + process.platform + " arch=" + process.arch
            );
          '

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  release-dry-run:
    name: Release dry-run (Windows, pack + smoke)
    needs: build-and-test
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Enable Corepack (uses runner's system Node; provides pnpm)
        run: corepack enable

      - name: Set up Node 22.23.1 with pnpm cache
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify node-pty binding
        working-directory: packages/cli-commands
        shell: bash
        run: |
          node -e '
            const pkg = require("node-pty/package.json");
            if (pkg.version !== "1.1.0") {
              throw new Error("unexpected node-pty version: " + pkg.version);
            }
            const mod = require("node-pty");
            if (typeof mod.spawn !== "function") {
              throw new Error("node-pty loaded without a callable spawn export");
            }
            console.log(
              "[node-pty binding] PASS: version=" + pkg.version +
              " spawn=function node=" + process.versions.node +
              " platform=" + process.platform + " arch=" + process.arch
            );
          '

      - name: Smoke (PowerShell 7+, pwsh)
        run: pwsh -ExecutionPolicy Bypass -File scripts/smoke-test.ps1

      - name: Smoke (Windows PowerShell 5.1, powershell.exe)
        run: powershell.exe -ExecutionPolicy Bypass -File scripts/smoke-test.ps1
