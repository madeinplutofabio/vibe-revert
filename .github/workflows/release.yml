name: Release

# Beta-only tag-push trigger for beta releases in the v0.7.x line
# (v0.7.x-beta.N). When stable releases ship (v0.7.0+), this
# workflow's regex must be widened OR a separate stable workflow
# must be added -- the post-publish smoke, release body, and
# --tag beta dist-tag here are all beta-specific.
#
# workflow_dispatch is validation-only: it can validate, install,
# lint, typecheck, build, test, pack, and run npm availability
# checks, but `npm publish`, post-publish smoke, and GitHub Release
# creation are push-tag only.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run_release_tag:
        description: 'Release tag to dry-run against (e.g. v0.7.1-beta.0). REQUIRED. This dispatch cannot publish: npm publish, post-publish smoke, and GitHub Release creation are all disabled for workflow_dispatch. Dispatch must run from the main branch.'
        required: true
        type: string

permissions:
  contents: read

# Action pinning (M H4): every third-party `uses:` is pinned to a full commit
# SHA with an informational version comment. GitHub Actions MUST remain pinned to
# full commit SHAs; the version comment MUST be updated together with the SHA.
# Updates MUST be made through a dependency-update PR or by resolving the
# official upstream tag to its commit, with the resulting diff reviewed before
# merge -- major aliases (e.g. @v5) MUST NOT be restored in executable `uses:`
# fields.

# Global release concurrency. One npm publish at a time across ALL
# tags -- prevents concurrent betas (e.g., v0.7.0-beta.0 and
# v0.7.0-beta.1 pushed close together) from racing the same npm
# packages and the `beta` dist-tag. cancel-in-progress=false: a
# second tag push MUST NOT cancel an in-flight publish.
concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish 10 packages to npm (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write   # npm --provenance requires OIDC token issuance
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0      # full history so annotated-tag check + future tag-aware logic work
          fetch-tags: true    # request annotated tag objects, not just refs

      - name: Fetch annotated release tag object
        # actions/checkout@v5 can resolve a tag-triggered ref to a
        # lightweight tag pointing at the commit even with
        # fetch-depth: 0 + fetch-tags: true, losing the annotated
        # metadata (tagger, message) the validate step needs to
        # distinguish annotated from lightweight tags. This explicit
        # fetch forces the annotated tag object to land in the
        # runner's local refs/tags/<TAG>. Skipped on workflow_dispatch:
        # the tag typically does not exist yet during pre-tag dry-run.
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          git cat-file -t "refs/tags/${GITHUB_REF_NAME}"

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node 22 with pnpm cache
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: pnpm

      - name: Validate tag (beta-only) + annotated + 10 publish targets + 2 private packages
        id: validate
        env:
          DRY_RUN_RELEASE_TAG: ${{ inputs.dry_run_release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Mode: ${GITHUB_EVENT_NAME}"

          # workflow_dispatch dry-run must run from main. A dry-run
          # against a stale branch would validate the wrong tree and
          # create false confidence before tagging.
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "workflow_dispatch dry-run must run from main, got ${GITHUB_REF_NAME}"
            exit 1
          fi

          # TAG_REF source: workflow_dispatch input (via env var, not
          # direct expression interpolation) or the pushed tag ref.
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG_REF="${DRY_RUN_RELEASE_TAG}"
          else
            TAG_REF="${GITHUB_REF_NAME}"
          fi

          # Beta-only regex validation runs IMMEDIATELY after TAG_REF
          # assignment and main-branch guard, BEFORE any echo of the
          # (possibly user-controlled) TAG_REF value. Stable v0.7.0
          # ships via a separate workflow path; the dist-tag /
          # post-publish smoke here are beta-specific.
          if [[ ! "$TAG_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "Unexpected release tag: $TAG_REF (expected v<MAJOR>.<MINOR>.<PATCH>-beta.<N>)"
            exit 1
          fi

          # Now safe to log the validated TAG_REF.
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "Dry-run dispatch: TAG_REF=${TAG_REF}"
          fi

          # Enforce annotated tag (M RP plan locked). Lightweight tags
          # are git-cat-file type "commit"; annotated tags are type "tag".
          # Skipped on workflow_dispatch: the tag typically does not
          # exist yet during pre-tag dry-run.
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            TAG_TYPE="$(git cat-file -t "refs/tags/${TAG_REF}")"
            if [[ "$TAG_TYPE" != "tag" ]]; then
              echo "Release tag ${TAG_REF} must be an annotated tag, not a lightweight tag (git cat-file type: ${TAG_TYPE})."
              echo "Recreate with: git tag -a ${TAG_REF} -m \"${TAG_REF}\" && git push origin ${TAG_REF}"
              exit 1
            fi
          else
            echo "Dry-run dispatch: skipping annotated-tag check (tag not expected to exist yet)."
          fi

          VERSION="${TAG_REF#v}"
          export VERSION
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Validate package.json state: all 10 publish-target versions
          # equal the tag suffix AND the 2 private packages remain
          # private at 0.0.0. Either mismatch is a hard failure.
          node -e '
            const fs = require("fs");
            const version = process.env.VERSION;
            const publishTargets = [
              "packages/session-format/package.json",
              "packages/core/package.json",
              "packages/git/package.json",
              "packages/checks/package.json",
              "packages/reporters/package.json",
              "packages/adapters/package.json",
              "packages/installers/package.json",
              "packages/cli-commands/package.json",
              "packages/mcp/package.json",
              "packages/cli/package.json",
            ];
            for (const p of publishTargets) {
              const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
              if (pkg.version !== version) {
                console.error(`${p}: expected version ${version}, got ${pkg.version}`);
                process.exit(1);
              }
              if (pkg.private === true) {
                console.error(`${p}: still has private: true (must be removed for publish)`);
                process.exit(1);
              }
            }
            console.log(`All 10 publish-target package versions match tag ${version}; private flags removed.`);

            const privateStubs = [
              "packages/policies-basic/package.json",
              "package.json",
            ];
            for (const p of privateStubs) {
              const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
              if (pkg.private !== true) {
                console.error(`${p}: expected private: true (must NOT publish)`);
                process.exit(1);
              }
              if (pkg.version !== "0.0.0") {
                console.error(`${p}: expected version "0.0.0", got "${pkg.version}"`);
                process.exit(1);
              }
            }
            console.log("All 2 private packages remain private at 0.0.0.");
          '

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Node and npm meet Trusted Publishing minimums
        shell: bash
        run: |
          set -euo pipefail
          # npm Trusted Publishing requires npm CLI >= 11.5.1 and Node
          # >= 22.14.0 (https://docs.npmjs.com/trusted-publishers).
          # Install npm 11 pinned to the major: `npm@latest` could drift
          # to a future major with a stricter Node engine and break this
          # runner later. Within npm 11, patch updates are safe.
          npm install -g npm@11
          node -e '
          const semver = (v) => v.replace(/^v/, "").split(".").map(Number);
          const ge = (a, b) => {
            const aa = semver(a), bb = semver(b);
            for (let i = 0; i < 3; i++) {
              if (aa[i] > bb[i]) return true;
              if (aa[i] < bb[i]) return false;
            }
            return true;
          };
          const nodeVersion = process.version;
          if (!ge(nodeVersion, "22.14.0")) {
            console.error(`Node ${nodeVersion} < 22.14.0 required for npm Trusted Publishing`);
            process.exit(1);
          }
          '
          npm_version="$(npm --version)"
          min_npm="11.5.1"
          if [ "$(printf '%s\n' "$min_npm" "$npm_version" | sort -V | head -1)" != "$min_npm" ]; then
            echo "npm version $npm_version < $min_npm required for npm Trusted Publishing"
            exit 1
          fi
          echo "Node $(node --version) and npm ${npm_version} meet Trusted Publishing minimums."

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Pack 10 publish-target tarballs (validate pack surface before publish)
        shell: bash
        run: |
          set -euo pipefail
          PACK_DIR="${RUNNER_TEMP}/viberevert-pack"
          mkdir -p "$PACK_DIR"
          PUBLISH_DIRS=(
            "packages/session-format"
            "packages/core"
            "packages/git"
            "packages/checks"
            "packages/reporters"
            "packages/adapters"
            "packages/installers"
            "packages/cli-commands"
            "packages/mcp"
            "packages/cli"
          )
          EXPECTED_NAMES=(
            "@viberevert/session-format"
            "@viberevert/core"
            "@viberevert/git"
            "@viberevert/checks"
            "@viberevert/reporters"
            "@viberevert/adapters"
            "@viberevert/installers"
            "@viberevert/cli-commands"
            "@viberevert/mcp"
            "viberevert"
          )
          # Defense-in-depth: assert directory-to-name mapping before
          # the pack loop. Catches "wrong dir / wrong package" failure
          # modes that a count check alone would miss.
          for i in "${!PUBLISH_DIRS[@]}"; do
            actual="$(node -p "require('./${PUBLISH_DIRS[$i]}/package.json').name")"
            expected="${EXPECTED_NAMES[$i]}"
            if [ "$actual" != "$expected" ]; then
              echo "Publish directory mismatch at index $i: ${PUBLISH_DIRS[$i]} has package name '$actual', expected '$expected'"
              exit 1
            fi
          done
          echo "All 10 publish directories map to the locked package names in order."

          for dir in "${PUBLISH_DIRS[@]}"; do
            echo "==> Packing $dir"
            (cd "$dir" && pnpm pack --pack-destination "$PACK_DIR")
          done
          count="$(find "$PACK_DIR" -maxdepth 1 -name '*.tgz' | wc -l | tr -d ' ')"
          if [ "$count" != "10" ]; then
            echo "Expected exactly 10 packed tarballs, got $count"
            find "$PACK_DIR" -maxdepth 1 -type f -print
            exit 1
          fi
          echo "All 10 publish-target tarballs packed into $PACK_DIR:"
          find "$PACK_DIR" -maxdepth 1 -name '*.tgz' -printf '  %f\n'

      - name: Pre-publish guard -- assert no target version is already published (404-strict)
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          PUBLISH_TARGETS=(
            "@viberevert/session-format"
            "@viberevert/core"
            "@viberevert/git"
            "@viberevert/checks"
            "@viberevert/reporters"
            "@viberevert/adapters"
            "@viberevert/installers"
            "@viberevert/cli-commands"
            "@viberevert/mcp"
            "viberevert"
          )
          view_err="$(mktemp)"
          trap 'rm -f "$view_err"' EXIT
          for pkg in "${PUBLISH_TARGETS[@]}"; do
            echo "Checking ${pkg}@${VERSION} on npm registry..."
            : > "$view_err"
            if npm view "${pkg}@${VERSION}" version >/dev/null 2>"$view_err"; then
              echo "ERROR: ${pkg}@${VERSION} already exists on npm."
              echo "Per partial-publish policy, bump to next beta iteration; do NOT reuse this version."
              exit 1
            fi
            # 404 is the only "safely not present" signal. Any other
            # error (auth, network, registry outage) is ambiguous and
            # MUST NOT be treated as "publish OK".
            if grep -Eq "(E404|404 Not Found|not found)" "$view_err"; then
              echo "  ${pkg}@${VERSION}: not present (publish OK)"
            else
              echo "ERROR: could not safely determine whether ${pkg}@${VERSION} exists. npm view stderr:"
              cat "$view_err"
              exit 1
            fi
          done

      - name: Publish 10 packed tarballs in dependency-safe order (Trusted Publisher / OIDC)
        if: github.event_name == 'push'
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          PACK_DIR="${RUNNER_TEMP}/viberevert-pack"
          # Locked tarball filenames matching the pack step's output,
          # in dependency-safe publish order. Scoped packages produce
          # viberevert-<name>-VERSION.tgz; the unscoped viberevert root
          # CLI produces viberevert-VERSION.tgz (digit-leading suffix).
          PUBLISH_TGZ=(
            "viberevert-session-format-${VERSION}.tgz"
            "viberevert-core-${VERSION}.tgz"
            "viberevert-git-${VERSION}.tgz"
            "viberevert-checks-${VERSION}.tgz"
            "viberevert-reporters-${VERSION}.tgz"
            "viberevert-adapters-${VERSION}.tgz"
            "viberevert-installers-${VERSION}.tgz"
            "viberevert-cli-commands-${VERSION}.tgz"
            "viberevert-mcp-${VERSION}.tgz"
            "viberevert-${VERSION}.tgz"
          )
          # Assert every tarball is present before any publish runs.
          # This is defense-in-depth against a between-step regression
          # (the pack step already produced and counted them).
          for tgz in "${PUBLISH_TGZ[@]}"; do
            if [ ! -f "$PACK_DIR/$tgz" ]; then
              echo "ERROR: expected packed tarball missing: $PACK_DIR/$tgz"
              exit 1
            fi
          done
          echo "All 10 expected tarballs present in $PACK_DIR."

          for tgz in "${PUBLISH_TGZ[@]}"; do
            echo "==> Publishing $tgz via OIDC Trusted Publisher"
            # --access public: required for scoped packages, harmless for unscoped viberevert
            # --tag beta:     dist-tag for pre-release (NOT latest)
            # --provenance:   SLSA attestation via OIDC (requires id-token: write)
            # No auth token: npm CLI 11.5.1+ uses GitHub Actions OIDC
            # token automatically when id-token: write is granted AND
            # a Trusted Publisher is configured for the package on npm.
            npm publish "$PACK_DIR/$tgz" --access public --tag beta --provenance
          done
          echo "All 10 packages published at version ${VERSION} with dist-tag beta."

      - name: Dry-run summary (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          DRY_RUN_RELEASE_TAG: ${{ inputs.dry_run_release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          echo "===================================================================="
          echo "DRY RUN ONLY: npm publish, post-publish smoke, and GitHub Release"
          echo "creation are disabled for workflow_dispatch."
          echo ""
          echo "Dispatched with dry_run_release_tag: ${DRY_RUN_RELEASE_TAG}"
          echo "This dispatch validated:"
          echo "  - Tag format regex"
          echo "  - Main-branch guard"
          echo "  - Package versions match tag"
          echo "  - Private packages remain private"
          echo "  - Node + npm meet Trusted Publishing minimums"
          echo "  - Lint / typecheck / build / test"
          echo "  - Pack surface for all 10 publish targets"
          echo "  - Pre-publish guard (npm view 404 for each target)"
          echo ""
          echo "To actually publish this release, push an annotated tag from main:"
          echo "  git tag -a \"${DRY_RUN_RELEASE_TAG}\" -m \"${DRY_RUN_RELEASE_TAG}\""
          echo "  git push origin \"${DRY_RUN_RELEASE_TAG}\""
          echo "===================================================================="

  post-publish-smoke:
    name: Post-publish smoke (Windows PowerShell 5.1)
    if: github.event_name == 'push'
    needs: publish
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node 22
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22

      - name: Run post-publish smoke against viberevert@beta
        env:
          RELEASE_VERSION: ${{ needs.publish.outputs.version }}
        # PS 5.1 (powershell.exe) is the same parser that surfaced
        # Step 3's BOM-injection class. Post-publish smoke runs here
        # so published bytes pass the same Windows path that
        # release-dry-run validates against locally-packed bytes.
        run: powershell.exe -ExecutionPolicy Bypass -File scripts/post-publish-smoke.ps1 -ExpectedVersion "$env:RELEASE_VERSION"

  github-release:
    name: Create GitHub Release
    if: github.event_name == 'push'
    needs: [publish, post-publish-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # create the GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: true
          body: |
            VibeRevert ${{ github.ref_name }} beta release.

            Published npm packages (dist-tag `beta`, version `${{ needs.publish.outputs.version }}`):
            - `@viberevert/session-format`
            - `@viberevert/core`
            - `@viberevert/git`
            - `@viberevert/checks`
            - `@viberevert/reporters`
            - `@viberevert/adapters`
            - `@viberevert/installers`
            - `@viberevert/cli-commands`
            - `@viberevert/mcp`
            - `viberevert`

            Install: `npm install viberevert@beta`

            Post-publish smoke (Windows PowerShell 5.1) passed against `viberevert@beta`:
            - `npm install` + version match
            - `npx viberevert --version` / `doctor` / `init --profile generic`
            - MCP server stdio probe: full 7-frame Phase 12f transcript (6 responses + 4 audit records)
            - MCP wire-shape locks: D99.Y protocolVersion, D99.A 8-tool order, D99.B reserved hiding, D99.O Cat 1/Cat 2, R31 reflection locks
            - MCP server exited 0 cleanly with empty stderr

            See CHANGELOG.md at the release tag for full notes.
