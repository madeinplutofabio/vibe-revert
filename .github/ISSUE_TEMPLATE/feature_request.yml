name: Feature request
description: Suggest an enhancement or new capability for VibeRevert.
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do, and what is missing or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like VibeRevert to do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried or considered.
    validations:
      required: false
