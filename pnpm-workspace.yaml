packages:
  - "packages/*"

# M G4 Step 4f.1 (D104.M.6, corrected 2026-07-15): node-pty is the SOLE
# third-party dependency pnpm may run lifecycle/build scripts for. It provisions
# its native binding from an upstream prebuild (Windows/macOS) or an upstream
# source build (Linux via node-gyp). Do NOT add any other package here without a
# reviewed native-dependency policy change.
onlyBuiltDependencies:
  - "node-pty"

# vite is a TRANSITIVE dependency (vitest -> vite; @vitest/mocker -> vite peer) and is
# not declared in any workspace manifest, so an ordinary `pnpm update` cannot re-resolve
# it. Both vitest consumers accept vite ^8, so this override pins the single transitive
# vite to the exact patched 8.0.16 (server.fs.deny bypass + launch-editor advisories) --
# a compatible, in-range patch, NOT a forced out-of-range upgrade.
overrides:
  vite: "8.0.16"

  # Runtime transitives via @modelcontextprotocol/sdk@1.29.0. The SDK is already
  # current, ordinary transitive updates did not move the lockfile, and each pinned
  # fix remains inside its direct parent's declared compatible range.
  fast-uri: "3.1.4"
  hono: "4.12.27"
  body-parser: "2.3.0"
